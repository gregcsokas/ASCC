services:
    postgres:
        image: postgres:alpine
        container_name: ascc_database
        environment:
            POSTGRES_USER: ascc
            POSTGRES_PASSWORD: ascc_root
            POSTGRES_DB: ascc
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ascc -d ascc"]
            interval: 3s
            timeout: 3s
            retries: 10
        ports:
            - "5432:5432"
        networks:
            - ascc-network
        volumes:
            - pg_data:/var/lib/postgresql
        restart: on-failure:3

    migrate:
        build:
            context: backend
            dockerfile: Dockerfile
        command: >
            sh -c "uv run tortoise -c app.core.database.TORTOISE_ORM upgrade &&
            uv run python -m app.cli accidents ingest /data/AviationData_SSC_case_Ranbir.csv"
        env_file:
            - .env
        volumes:
            - ./backend/app:/code/app
            - ./data:/data:ro
        depends_on:
            postgres:
                condition: service_healthy
        networks: [ascc-network]
        restart: "no"

    app:
        build:
            context: backend
            dockerfile: Dockerfile
        env_file:
            - .env
        container_name: ascc_backend
        ports:
            - "8080:8080"
        networks:
            - ascc-network
        volumes:
            - ./backend/app:/code/app
        depends_on:
            migrate:
                condition: service_completed_successfully
        restart: on-failure:3

    frontend:
        build:
            context: frontend
            dockerfile: Dockerfile
        container_name: ascc_frontend
        ports:
            - "4200:80"
        environment:
            BACKEND_URL: http://app:8080
        networks:
            - ascc-network
        depends_on:
            - app
        restart: on-failure:3

volumes:
  pg_data:

networks:
  ascc-network: